# 统一的 Docker Compose 配置
#
# 开发模式:
#   cd deploy && docker compose -f docker-compose.yml --profile postgres --profile dev up
#
# 生产模式:
#   cd deploy && docker compose -f docker-compose.yml --profile postgres --profile prod up
#
# PostgreSQL 作为正式主库，默认启动

services:
  # PostgreSQL 数据库 (正式主库)
  postgres:
    image: postgres:16-alpine
    container_name: stocktrade-postgres
    profiles:
      - postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-stocktrade}
      - POSTGRES_USER=${POSTGRES_USER:-stocktrade}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-stocktrade123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocktrade}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - stocktrade-net

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: stocktrade-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      sh -c "redis-server
      --requirepass ${REDIS_PASSWORD:-stocktrade_redis_123}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-stocktrade_redis_123} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - stocktrade-net

  backend:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR: ${APT_MIRROR:-deb.debian.org}
        INSTALL_BUILD_DEPS: ${INSTALL_BUILD_DEPS:-0}
    container_name: stocktrade-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./.env:/app/.env
      - ../data:/app/data
      - ../backend:/app/backend
      - ../pipeline:/app/pipeline
      - ../agent:/app/agent
      - ../config:/app/config:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/backend
      # 容器内必须使用 Docker 服务名 postgres，避免宿主机 DATABASE_URL=localhost 污染 backend。
      - DATABASE_URL=postgresql://${POSTGRES_USER:-stocktrade}:${POSTGRES_PASSWORD:-stocktrade123}@postgres:5432/${POSTGRES_DB:-stocktrade}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_PASSWORD=${REDIS_PASSWORD:-stocktrade_redis_123}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    restart: ${RESTART:-unless-stopped}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - stocktrade-net

  # 开发模式的前端服务 (带热更新)
  frontend-dev:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.frontend-dev
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    container_name: stocktrade-frontend-dev
    profiles:
      - dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_API_PROXY_TARGET=http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    networks:
      - stocktrade-net

  # 生产模式的 Nginx 服务
  nginx:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.nginx
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:1.27-alpine}
    container_name: stocktrade-nginx
    profiles:
      - prod
    ports:
      - "${NGINX_PORT:-127.0.0.1:80}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - stocktrade-net

networks:
  stocktrade-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
