version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocktrade-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./pipeline:/app/pipeline:ro
      - ./agent:/app/agent:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/backend
      - DATABASE_URL=sqlite:///data/db/stocktrade.db
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - stocktrade-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: stocktrade-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stocktrade-net

  # 生产环境 Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: stocktrade-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - stocktrade-net
    profiles:
      - production

networks:
  stocktrade-net:
    driver: bridge
