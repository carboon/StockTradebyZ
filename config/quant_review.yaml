# quant_review.yaml
# 第 4 步程序化复核配置。
# 目标：
# 1. 复刻 prompt.md 的四维评分结构
# 2. 与第 2 步初选解耦，不重复使用 KDJ / 知行线 / 砖型图 / 周线多头过滤
# 3. 所有计算都严格按 pick_date 截断，允许做历史滚动回测

# 候选列表 JSON
candidates: data/candidates/candidates_latest.json

# 原始 CSV 数据目录
raw_dir: data/raw

# 评分结果输出目录
output_dir: data/review

# true: 跳过已存在单股 JSON（断点续跑）
skip_existing: false

# 推荐最小分数门槛
suggest_min_score: 4.0

# 直接禁用的第 2 步来源。
# 当前 5d 目标下，brick 在独立验证里稳定性不足，因此第 4 步不再接收该来源。
disabled_strategies:
  - brick

# 判定阈值
thresholds:
  pass_score: 4.0
  watch_score: 3.2
  # 5d 持有目标下，PASS 只接受 4-5 分的位置结构；
  # 3 分属于“接近前高区”，保留为 WATCH，不直接推荐。
  pass_min_position_score: 4

# ── 趋势结构（独立于初选） ───────────────────────────────
trend:
  ema_fast: 20
  ema_slow: 60
  slope_fast_lookback: 5
  slope_slow_lookback: 10
  slope_fast_strong: 0.020
  slope_fast_positive: 0.008
  slope_slow_positive: 0.010
  efficiency_lookback: 20
  efficiency_strong: 0.45
  efficiency_healthy: 0.30
  breakout_lookback: 20
  breakout_fresh_days: 10
  pullback_limit: 0.08
  close_above_fast_ratio_lookback: 10
  close_above_fast_ratio_min: 0.60

# ── 价格位置 ───────────────────────────────────────────
position:
  range_lookback: 120
  runup_lookback: 60
  long_high_lookback: 250
  ideal_range_low: 0.35
  ideal_range_high: 0.70
  breakout_range_high: 0.85
  pressure_distance: 0.05
  long_high_space_min: 0.10
  runup_cool: 0.35
  runup_hot: 0.60
  runup_exhausted: 1.00
  extension_atr_watch: 2.5
  extension_atr_fail: 3.5

# ── 量价行为 ───────────────────────────────────────────
volume:
  window: 20
  obv_lookback: 10
  up_down_ratio_strong: 1.25
  up_down_ratio_healthy: 1.05
  up_down_ratio_weak: 0.90
  distribution_drop: -0.025
  distribution_vol_ratio: 1.50
  severe_distribution_drop: -0.040
  severe_distribution_vol_ratio: 1.80
  pullback_window: 3
  thrust_window: 10
  pullback_dryup_strong: 0.65
  pullback_dryup_healthy: 0.85

# ── 历史异动 / 建仓痕迹 ────────────────────────────────
abnormal:
  window: 60
  breakout_lookback: 20
  pulse_return_strong: 0.035
  pulse_return_mild: 0.020
  pulse_body_strong: 0.020
  pulse_body_mild: 0.010
  pulse_vol_strong: 1.80
  pulse_vol_mild: 1.30
  pulse_fresh_days: 25
  hold_ratio: 0.98
  runup_safe: 0.50
  runup_danger: 1.00

# ── 评论中的周线语境（不参与打分） ───────────────────────
weekly_context:
  ema_fast: 8
  ema_slow: 21
  slope_lookback: 3

# ── 第 4 步前置过滤（只做风险标记，不阻断评分） ─────────────
prefilter:
  enabled: true
  cache_dir: data/tushare_cache
  history_start: "20190101"

  universe:
    exclude_st: true
    min_listing_days: 120
    # 当前 token 无 stk_alert 权限，因此“重点提示证券”先不启用，
    # 否则无法做可回放的历史一致验证。

  unlock:
    enabled: true
    lookahead_days: 20
    # future_unlock_float_share / free_share
    max_free_share_ratio: 0.15

  size_bucket:
    enabled: true
    # 按当日全市场 circ_mv 截面三分位分层。
    quantiles: [0.333333, 0.666667]
    # 默认只分层回测，不直接过滤；如需过滤可填写 [small] / [mid, large] 等。
    allowed: []

  industry_strength:
    enabled: true
    lookback_days: 20
    top_pct: 0.30
    benchmark_index: 000905.SH

  market_regime:
    enabled: true
    lookback_days: 20
    ema_fast: 20
    ema_slow: 60
    # 中证500 / 创业板指至少 1 个达标即视为 prefilter 通过；
    # 未通过时仍继续评分，只在结果里标记 blocked。
    min_pass_count: 1
    indexes:
      - ts_code: 000905.SH
        name: CSI500
      - ts_code: 399006.SZ
        name: CHINEXT

  # THS 概念资金流当前不启用：
  # 1) 当前可用 moneyflow_ind_ths 主要是 THS 行业，不是真正概念流；
  # 2) 历史成员映射难以稳定回放，先不纳入正式过滤。

# ── 滚动回测 ───────────────────────────────────────────
backtest:
  output_dir: data/backtest
  holding_periods: [1, 3, 5, 10]
  score_buckets:
    - 3.2
    - 3.5
    - 4.0
