services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocktrade-backend
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
      - ./pipeline:/app/pipeline:ro
      - ./agent:/app/agent:ro
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app:/app/backend
      - DATABASE_URL=sqlite:///data/db/stocktrade.db
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - ENVIRONMENT=production
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - stocktrade-net

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: stocktrade-nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - stocktrade-net

networks:
  stocktrade-net:
    driver: bridge
